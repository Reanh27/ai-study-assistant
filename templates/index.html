<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Study Assistant</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="container">
        <h1>AI Study Planner</h1>

        <form id="studyForm">
            <input type="text" id="subject" placeholder="Enter subject" required>
            <input type="number" id="hours" placeholder="Study hours" required>
            <input type="text" id="weakness" placeholder="Weak topics" required>
            <button type="submit">Generate Plan</button>
        </form>

        <div class="card">
            <h2>Your Study Plan</h2>
            <ul id="result"></ul>
        </div>

        <div class="card">
            <h2>Study Chatbot</h2>
            <input type="text" id="chatInput" placeholder="Ask a study question">
            <button onclick="askAI()">Ask</button>
            <div class="chat-box">
                <p id="chatResponse">I'm here to help with your studies!</p>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
