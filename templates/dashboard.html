<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progress Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <div class="container">

        <h1>📊 Progress Dashboard</h1>
        <p class="subtitle">Track your academic growth and productivity</p>

        <div class="top-buttons">
            <a href="/"><button>🏠 Home</button></a>
            <a href="/history"><button>📚 History</button></a>
            <a href="/logout"><button>🚪 Logout</button></a>
        </div>

        <div class="stats">

            <div class="stat-box">
                <h2>{{ total_plans }}</h2>
                <p>Total Study Plans Created</p>
            </div>

            <div class="stat-box">
                <h2>{{ subjects|length }}</h2>
                <p>Subjects Studied</p>
            </div>

        </div>

        <div class="card">
            <h2>📈 Study Progress Chart</h2>
            <canvas id="progressChart"></canvas>
        </div>

        <div class="card">
            <h2>📘 Subjects You've Worked On</h2>

            <ul>
                {% for subject in subjects %}
                    <li>{{ subject[0] }}</li>
                {% endfor %}
            </ul>
        </div>

    </div>

    <script>
        const totalPlans = parseInt("{{ total_plans }}");
        const totalSubjects = parseInt("{{ subjects|length }}");

        const ctx = document.getElementById('progressChart').getContext('2d');

        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['Study Plans', 'Subjects'],
                datasets: [{
                    label: 'Your Progress',
                    data: [totalPlans, totalSubjects],
                    backgroundColor: [
                        'rgba(0, 198, 255, 0.7)',
                        'rgba(0, 114, 255, 0.7)'
                    ],
                    borderRadius: 10
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: {
                        labels: {
                            color: 'white'
                        }
                    }
                },
                scales: {
                    y: {
                        beginAtZero: true,
                        ticks: {
                            color: 'white'
                        }
                    },
                    x: {
                        ticks: {
                            color: 'white'
                        }
                    }
                }
            }
        });
    </script>

</body>
</html>
