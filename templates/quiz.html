<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Center</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="sidebar">

    <div class="logo">
        🧠 AI Study Assistant
        <span>Smart Learning Hub</span>
    </div>

    <div class="menu">
        <a href="/dashboard">📊 Dashboard</a>
        <a href="/ai_tutor">🤖 AI Tutor</a>
        <a class="active" href="/quiz">📝 Quiz</a>
        <a href="/flashcards">📚 Flashcards</a>
        <a href="/notes">📒 Notes</a>
        <a href="/schedule">📅 Schedule</a>
        <a href="/history">📜 History</a>
        <a href="/upload">📂 Documents</a>
        <a href="/progress">📈 Progress</a>
        <a href="/logout">🚪 Logout</a>
    </div>

</div>

<div class="main-content">

    <div class="header">
        <h1>📝 Quiz Center</h1>
        <p>Test your knowledge and track your score.</p>
    </div>

    <div class="card">

        <h2>Question 1</h2>

        <p>What does AI stand for?</p>

        <button onclick="checkAnswer('a')">
            Artificial Intelligence
        </button>

        <br><br>

        <button onclick="checkAnswer('b')">
            Automatic Internet
        </button>

        <br><br>

        <button onclick="checkAnswer('c')">
            Advanced Interface
        </button>

        <br><br>

        <button onclick="checkAnswer('d')">
            None of these
        </button>

        <br><br>

        <div id="result" class="chat-box">
            Select an answer...
        </div>

    </div>

</div>

<script>

function checkAnswer(choice){

    if(choice === "a"){
        document.getElementById("result").innerHTML =
        "✅ Correct! AI = Artificial Intelligence";
    }
    else{
        document.getElementById("result").innerHTML =
        "❌ Wrong Answer";
    }

}

</script>

</body>
</html>
