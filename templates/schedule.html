<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Schedule</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="sidebar">

    <div class="logo">
        🧠 AI Study Assistant
        <span>Smart Learning Hub</span>
    </div>

    <div class="menu">
        <a href="/dashboard">📊 Dashboard</a>
        <a href="/ai_tutor">🤖 AI Tutor</a>
        <a href="/quiz">📝 Quiz</a>
        <a href="/flashcards">📚 Flashcards</a>
        <a href="/notes">📒 Notes</a>
        <a class="active" href="/schedule">📅 Schedule</a>
        <a href="/history">📜 History</a>
        <a href="/upload">📂 Documents</a>
        <a href="/progress">📈 Progress</a>
        <a href="/logout">🚪 Logout</a>
    </div>

</div>

<div class="main-content">

    <div class="header">
        <h1>📅 Study Planner</h1>
        <p>Plan your daily learning activities.</p>
    </div>

    <div class="card">

        <h2>Add Task</h2>

        <input
            type="text"
            id="taskInput"
            placeholder="Enter study task..."
        >

        <button onclick="addTask()">
            Add Task
        </button>

    </div>

    <div class="card">

        <h2>Today's Tasks</h2>

        <ul id="taskList"></ul>

    </div>

</div>

<script>

function loadTasks(){

let tasks =
JSON.parse(localStorage.getItem("tasks")) || [];

let html = "";

tasks.forEach((task,index)=>{

html += `
<li style="
padding:12px;
margin:10px 0;
background:#1e293b;
border-radius:10px;
display:flex;
justify-content:space-between;
align-items:center;
">
${task}
<button onclick="deleteTask(${index})">
Delete
</button>
</li>
`;

});

document.getElementById("taskList").innerHTML = html;

}

function addTask(){

let task =
document.getElementById("taskInput").value;

if(task==="") return;

let tasks =
JSON.parse(localStorage.getItem("tasks")) || [];

tasks.push(task);

localStorage.setItem(
"tasks",
JSON.stringify(tasks)
);

document.getElementById("taskInput").value="";

loadTasks();

}

function deleteTask(index){

let tasks =
JSON.parse(localStorage.getItem("tasks")) || [];

tasks.splice(index,1);

localStorage.setItem(
"tasks",
JSON.stringify(tasks)
);

loadTasks();

}

loadTasks();

</script>

</body>
</html>
